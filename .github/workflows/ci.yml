name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apple-silicon-test:
    name: Apple Silicon checks
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust with rustfmt
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          rustc --version
          cargo --version

      - name: Verify native architecture
        run: test "$(uname -m)" = arm64

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Validate signed UI smoke tooling
        run: scripts/test-ui-smoke.sh

      - name: Test distribution artifact guard
        run: scripts/test-package-artifact.sh

      - name: Test universal binary contract
        run: scripts/test-universal.sh

      - name: Test release contract
        run: scripts/test-release.sh

      - name: Test staged-content guard
        run: scripts/test-pre-commit.sh

      - name: Test personal-GitHub identity guard
        run: scripts/test-pre-push.sh

      - name: Run Rust tests
        run: cargo test --locked

  intel-test:
    name: Intel checks
    runs-on: macos-15-intel
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust with rustfmt
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          rustc --version
          cargo --version

      - name: Verify native architecture
        run: test "$(uname -m)" = x86_64

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Rust tests
        run: cargo test --locked
