name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: macOS checks
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust with rustfmt
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test staged-content guard
        run: scripts/test-pre-commit.sh

      - name: Test personal-GitHub identity guard
        run: scripts/test-pre-push.sh

      - name: Run Rust tests
        run: cargo test --locked
