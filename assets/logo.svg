  <circle cx="548" cy="332" r="33" fill="#22B8E6"/>

  <!-- Lower platter edges turn one disk into a memorable deck. -->
  <path fill="#102A56" d="M210 535C300 660 690 720 790 535C765 700 650 775 500 785C350 775 235 700 210 535Z"/>
  <path fill="#102A56" d="M245 690C340 805 650 835 760 675C720 845 615 920 490 925C360 915 270 830 245 690Z"/>
